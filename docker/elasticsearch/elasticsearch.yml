# QAPlus Elasticsearch 設定（含 CORS 供 Elasticvue 等瀏覽器工具連線）

cluster.name: "qaplus-cluster"
node.name: "qaplus-node"

# 對外監聽
network.host: 0.0.0.0

# 單節點
discovery.type: single-node

# 磁碟水位（預設 90% 過嚴，VM 磁碟較小時易觸發；調高以允許分配）
cluster.routing.allocation.disk.watermark.low: "95%"
cluster.routing.allocation.disk.watermark.high: "97%"
cluster.routing.allocation.disk.watermark.flood_stage: "99%"

# 關閉 X-Pack 認證（開發環境）
xpack.security.enabled: false

# Snapshot 備份路徑（供 daily_backup.sh 使用）
path.repo: ["/usr/share/elasticsearch/backup"]

# CORS：讓 Elasticvue 等瀏覽器端工具可連線
http.cors.enabled: true
http.cors.allow-origin: "*"
http.cors.allow-methods: OPTIONS, HEAD, GET, POST, PUT, DELETE
http.cors.allow-headers: "X-Requested-With, Content-Type, Content-Length, Authorization, Accept"
